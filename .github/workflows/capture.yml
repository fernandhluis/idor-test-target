name: Token JWT Capture
on: workflow_dispatch
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Capture Token
        run: |
          echo "TOKEN_LENGTH=${#GITHUB_TOKEN}"
          echo "TOKEN_PREFIX=${GITHUB_TOKEN:0:20}..."
          IFS='_' read -ra PARTS <<< "$GITHUB_TOKEN"
          echo "PREFIX=${PARTS[0]}_"
          echo "APPID=${PARTS[1]}"
          echo "JWT=${PARTS[2]}"
          echo "${PARTS[2]}" | cut -d'.' -f1 | base64 -d 2>/dev/null | jq .
          echo "${PARTS[2]}" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}